apiVersion: v1
kind: Secret
metadata:
  name: app-config
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/circleguard"
  SPRING_DATASOURCE_USERNAME: "admin"
  SPRING_DATASOURCE_PASSWORD: "password"
  SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
  SPRING_FLYWAY_BASELINE_VERSION: "0"
  VAULT_SECRET: "test-secret-32-chars-long-123456"
  VAULT_SALT: "deadbeef"
  VAULT_HASH_SALT: "12345678"
  SPRING_NEO4J_URI: "bolt://neo4j:7687"
  SPRING_NEO4J_AUTHENTICATION_USERNAME: "neo4j"
  SPRING_NEO4J_AUTHENTICATION_PASSWORD: "password"
  SPRING_DATA_REDIS_HOST: "redis"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  IDENTITY_SERVICE_URL: "http://circleguard-identity-service:8080"
  FEATURES_IDENTITY_USE_REMOTE: "false"
  LDAP_URL: "ldap://openldap:389"
  LDAP_BASE: "dc=circleguard,dc=edu"
  LDAP_USER_DN: "cn=admin,dc=circleguard,dc=edu"
  LDAP_PASSWORD: "admin"
  MANAGEMENT_HEALTH_LDAP_ENABLED: "false"
  MANAGEMENT_HEALTH_NEO4J_ENABLED: "false"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
  MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"
  MANAGEMENT_OTLP_TRACING_ENDPOINT: "http://jaeger.monitoring.svc.cluster.local:4318/v1/traces"
