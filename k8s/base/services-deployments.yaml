apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-identity-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: circleguard-identity-service
  template:
    metadata:
      labels:
        app: circleguard-identity-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: identity
          image: diegoapolancol/circleguard-identity-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: app-config
          env:
            - name: JAVA_OPTS
              value: "-XX:TieredStopAtLevel=1 -Xms256m -Xmx512m"
            - name: SPRING_JPA_OPEN_IN_VIEW
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-identity-service
spec:
  selector:
    app: circleguard-identity-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

---
