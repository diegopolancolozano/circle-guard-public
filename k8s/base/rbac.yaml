apiVersion: v1
kind: ServiceAccount
metadata:
  name: circleguard-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: circleguard-app-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: circleguard-app-rolebinding
subjects:
  - kind: ServiceAccount
    name: circleguard-app
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: circleguard-app-role
