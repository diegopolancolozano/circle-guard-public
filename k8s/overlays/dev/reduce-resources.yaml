# Resource reduction for stage environment
# Infra and services use minimal resources — stage is for E2E validation, not load testing.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
spec:
  strategy:
    type: Recreate
  template:
    spec:
      containers:
        - name: kafka
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx128m -Xms64m"
            - name: KAFKA_JVM_PERFORMANCE_OPTS
              value: "-XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:+ExplicitGCInvokesConcurrent"
          resources:
            requests:
              memory: "192Mi"
              cpu: "100m"
            limits:
              memory: "320Mi"
              cpu: "300m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
spec:
  strategy:
    type: Recreate
  template:
    spec:
      containers:
        - name: zookeeper
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx96m -Xms64m"
          resources:
            requests:
              memory: "96Mi"
              cpu: "50m"
            limits:
              memory: "192Mi"
              cpu: "150m"

