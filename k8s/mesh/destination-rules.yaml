##############################################################################
# DestinationRules — circuit breakers, retry policies y connection pool
# para cada microservicio CircleGuard.
#
# Aplica en stage (namespace por defecto del mesh de pruebas).
# Replicar en dev y prod cambiando el namespace.
##############################################################################

# ── auth-service ──────────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: circleguard-auth-service
  namespace: stage
spec:
  host: circleguard-auth-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
    outlierDetection:
      # Circuit breaker: eject host after 5 consecutive 5xx errors
      consecutiveGatewayErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: stable
      labels:
        version: stable
    - name: canary
      labels:
        version: canary

