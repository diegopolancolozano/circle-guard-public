---
# ── gateway-service — canary deploy 90/10 ─────────────────────────────────────
# Este servicio se usa como ejemplo de canary en la demo.
# 90% va a stable (tag actual), 10% va a canary (nueva versión).
# Para promover canary: cambiar weights a 100/0 para canary y hacer rollout.
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: circleguard-gateway-service
  namespace: stage
spec:
  hosts:
    - circleguard-gateway-service
  http:
    - retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: gateway-error,connect-failure,retriable-4xx
      timeout: 30s
      route:
        - destination:
            host: circleguard-gateway-service
            subset: stable
          weight: 90
        - destination:
            host: circleguard-gateway-service
            subset: canary
          weight: 10

