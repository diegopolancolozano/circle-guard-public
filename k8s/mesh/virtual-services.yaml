##############################################################################
# VirtualServices — traffic shifting para canary deployments
#
# Por defecto: 100% tráfico a stable.
# Para activar canary en gateway: ajustar los weights (ej. 90/10).
#
# Ejemplo de activación de canary en gateway:
#   kubectl -n stage patch virtualservice circleguard-gateway-service \
#     --type=json \
#     -p='[{"op":"replace","path":"/spec/http/0/route/0/weight","value":90},
#           {"op":"replace","path":"/spec/http/0/route/1/weight","value":10}]'
##############################################################################

# ── auth-service ──────────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: circleguard-auth-service
  namespace: stage
spec:
  hosts:
    - circleguard-auth-service
  http:
    - retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: gateway-error,connect-failure,retriable-4xx
      timeout: 15s
      route:
        - destination:
            host: circleguard-auth-service
            subset: stable
          weight: 100
        - destination:
            host: circleguard-auth-service
            subset: canary
          weight: 0

