##############################################################################
# Kiali — visualización del service mesh
# Requiere Istio instalado y Prometheus en namespace monitoring.
##############################################################################

apiVersion: v1
kind: ServiceAccount
metadata:
  name: kiali
  namespace: istio-system

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kiali
  namespace: istio-system
data:
  config.yaml: |
    auth:
      openid: {}
      openshift: {}
      strategy: anonymous
    deployment:
      accessible_namespaces:
        - dev
        - stage
        - prod
      additional_service_yaml: {}
      affinity:
        node: {}
        pod: {}
        pod_anti: {}
      image_name: quay.io/kiali/kiali
      image_pull_policy: Always
      image_version: v1.82
      ingress_enabled: false
      namespace: istio-system
      replicas: 1
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 10m
          memory: 64Mi
    external_services:
      prometheus:
        url: http://prometheus.monitoring:9090
      tracing:
        enabled: true
        in_cluster_url: http://jaeger.monitoring:16686
        use_grpc: false
      grafana:
        enabled: true
        in_cluster_url: http://grafana.monitoring:3000
    istio_namespace: istio-system
    server:
      port: 20001
      web_root: /kiali

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiali
  namespace: istio-system
  labels:
    app: kiali
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kiali
  template:
    metadata:
      labels:
        app: kiali
    spec:
      serviceAccountName: kiali
      containers:
        - name: kiali
          image: quay.io/kiali/kiali:v1.82
          imagePullPolicy: Always
          ports:
            - name: api-port
              containerPort: 20001
          readinessProbe:
            httpGet:
              path: /kiali/healthz
              port: 20001
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /kiali/healthz
              port: 20001
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: kiali-config
              mountPath: /kiali-configuration
      volumes:
        - name: kiali-config
          configMap:
            name: kiali

---
apiVersion: v1
kind: Service
metadata:
  name: kiali
  namespace: istio-system
  labels:
    app: kiali
spec:
  selector:
    app: kiali
  ports:
    - name: http
      port: 20001
      targetPort: 20001

---
# ClusterRole para que Kiali pueda leer recursos del mesh
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kiali-viewer
rules:
  - apiGroups: [""]
    resources: ["configmaps","endpoints","namespaces","nodes","pods","pods/log","replicationcontrollers","services","serviceaccounts"]
    verbs: ["get","list","watch"]
  - apiGroups: ["extensions","apps"]
    resources: ["deployments","replicasets","statefulsets","daemonsets"]
    verbs: ["get","list","watch"]
  - apiGroups: ["networking.istio.io","security.istio.io","telemetry.istio.io"]
    resources: ["*"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["authentication.istio.io"]
    resources: ["*"]
    verbs: ["get","list","watch"]
  - apiGroups: ["monitoring.kiali.io"]
    resources: ["monitoringdashboards"]
    verbs: ["get","list","watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kiali-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kiali-viewer
subjects:
  - kind: ServiceAccount
    name: kiali
    namespace: istio-system
