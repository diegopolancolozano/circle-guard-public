##############################################################################
# Let's Encrypt ClusterIssuers — staging (test) + production
#
# Apply AFTER cert-manager is installed:
#   kubectl apply -f k8s/tls/cluster-issuer.yaml
#
# Use letsencrypt-staging first; once certificates issue correctly switch
# the Ingress annotation to letsencrypt-prod.
##############################################################################

# ── Staging (rate-limit friendly) ─────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: devops@circleguard.local
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# ── Production ─────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@circleguard.local
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
