apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        isDefault: false
        editable: false

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: circleguard
        folder: CircleGuard
        type: file
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-circleguard
  namespace: monitoring
data:
  circleguard-overview.json: |
    {
      "title": "CircleGuard Services",
      "uid": "circleguard-overview",
      "schemaVersion": 38,
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Servicios UP",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 3
                  },
                  {
                    "color": "green",
                    "value": 6
                  }
                ]
              },
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "count(up{job=\"circleguard-services\",namespace=\"stage\"} == 1)",
              "legendFormat": "up"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Pods Running",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 4
                  },
                  {
                    "color": "green",
                    "value": 6
                  }
                ]
              },
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "count(up{job=\"circleguard-services\",namespace=\"stage\"})",
              "legendFormat": "pods"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Request Rate (rps)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 0
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"circleguard-services\",namespace=\"stage\"}[2m]))",
              "legendFormat": "rps"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Latencia p95 (ms)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 0
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 500
                  },
                  {
                    "color": "red",
                    "value": 2000
                  }
                ]
              },
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=\"circleguard-services\",namespace=\"stage\"}[2m])) by (le)) * 1000",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Error Rate (rps)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 0
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.05
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"circleguard-services\",namespace=\"stage\",status=~\"4..|5..\"}[2m]))",
              "legendFormat": "errors"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "JVM Heap Total (MB)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 0
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 600
                  },
                  {
                    "color": "red",
                    "value": 1200
                  }
                ]
              },
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "sum(jvm_memory_used_bytes{area=\"heap\",job=\"circleguard-services\",namespace=\"stage\"}) / 1024 / 1024",
              "legendFormat": "heap MB"
            }
          ]
        },
        {
          "id": 7,
          "type": "table",
          "title": "Estado de cada Servicio",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "options": {
            "showHeader": true
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "left",
                "displayMode": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "0": {
                            "color": "red",
                            "text": "DOWN",
                            "index": 0
                          },
                          "1": {
                            "color": "green",
                            "text": "UP",
                            "index": 1
                          }
                        }
                      }
                    ]
                  },
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "up{job=\"circleguard-services\",namespace=\"stage\"}",
              "legendFormat": "{{service}}",
              "instant": true,
              "format": "table"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "HTTP Request Rate por Servicio (rps)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"circleguard-services\",namespace=\"stage\"}[2m])) by (service)",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "HTTP p95 Latencia por Servicio (ms)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5
              }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=\"circleguard-services\",namespace=\"stage\"}[2m])) by (le, service)) * 1000",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "JVM Heap Usado por Pod (MB)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              }
            }
          },
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{area=\"heap\",job=\"circleguard-services\",namespace=\"stage\"} / 1024 / 1024",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "HTTP Respuestas por Status Code",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 20
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"circleguard-services\",namespace=\"stage\"}[2m])) by (status)",
              "legendFormat": "HTTP {{status}}"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "JVM GC — Tiempo de pausa (ms/s)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 20
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(jvm_gc_pause_seconds_sum{job=\"circleguard-services\",namespace=\"stage\"}[2m])) by (pod) * 1000",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "JVM Threads Activos",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 28
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5
              }
            }
          },
          "targets": [
            {
              "expr": "jvm_threads_live_threads{job=\"circleguard-services\",namespace=\"stage\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "JVM Non-Heap Memory (MB)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 28
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5
              }
            }
          },
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{area=\"nonheap\",job=\"circleguard-services\",namespace=\"stage\"} / 1024 / 1024",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Circuit Breaker State (0=CLOSED  1=OPEN  2=HALF_OPEN)",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 36
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2
              }
            }
          },
          "targets": [
            {
              "expr": "resilience4j_circuitbreaker_state{job=\"circleguard-services\",namespace=\"stage\"}",
              "legendFormat": "{{name}} -- {{pod}}"
            }
          ]
        }
      ]
    }


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "circleguard"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          projected:
            sources:
              - configMap:
                  name: grafana-dashboard-circleguard
              - configMap:
                  name: grafana-dashboard-finops

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
