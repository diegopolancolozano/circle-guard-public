qr.secret=${QR_SECRET:change-me}
jwt.secret=${QR_SECRET:change-me}
jwt.expiration=3600000
qr.expiration=3600000

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.ldap.enabled=false
spring.flyway.table=flyway_schema_history_auth

# Feature toggle: identity mapping strategy
features.identity.use-remote=true

# Resilience4j circuit breaker for IdentityClient
resilience4j.circuitbreaker.instances.identityClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.identityClient.sliding-window-size=10
resilience4j.circuitbreaker.instances.identityClient.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.identityClient.wait-duration-in-open-state=10s
